<style>
:root{--bg:#0a0c10;--bg2:#14161b;--bg3:#1c1f26;--border:#282c34;--text:#e1e4e8;--dim:#6e7681;--accent:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
header{background:linear-gradient(135deg,#0d1117,#161b22);padding:20px 28px;border-bottom:1px solid var(--border)}
header h1{font-size:22px;font-weight:700;margin-bottom:2px}
header p{color:var(--dim);font-size:13px}
header .bar{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
header .bar .s{font-size:12px;color:var(--dim);padding:3px 10px;border-radius:12px;background:var(--bg3);border:1px solid var(--border)}
.ctrls{display:flex;gap:8px;padding:12px 28px;flex-wrap:wrap;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.ctrls input,.ctrls select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:13px;outline:none}
.ctrls input:focus,.ctrls select:focus{border-color:var(--accent)}
.ctrls input{flex:1;min-width:160px}.ctrls select{min-width:100px;cursor:pointer}
.ctrls label{font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--dim)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:16px 28px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card .top{height:100px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative}
.card .top img{width:100%;height:100%;object-fit:cover}.card .top .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:36px}
.card .body{padding:14px}
.card .body .hd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card .body .hd .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.card .body .hd .sc{font-size:12px;font-weight:600}
.card .body h3{font-size:15px;font-weight:600;margin-bottom:4px}
.card .body .meta{display:flex;gap:6px;font-size:11px;color:var(--dim);flex-wrap:wrap;margin-bottom:4px}
.card .body .meta s{padding:1px 6px;border-radius:4px;background:var(--bg3)}
.card .body .note{font-size:12px;color:var(--dim);margin-bottom:6px}
.card .body .stores{display:flex;gap:4px;flex-wrap:wrap}
.card .body .stores a{font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;color:#fff;text-decoration:none}
.pg{display:flex;justify-content:center;align-items:center;gap:10px;padding:20px 28px}
.pg button{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px}
.pg button:hover{background:var(--bg3);border-color:var(--accent)}
.pg button:disabled{opacity:.4;cursor:default}
.pg span{font-size:13px;color:var(--dim)}
.empty{text-align:center;padding:60px;color:var(--dim)}
.md{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:100;padding:20px}
.md.active{display:flex}
.md .box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:660px;width:100%;max-height:85vh;overflow-y:auto}
.md .box .mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.md .box .mh h2{font-size:18px;margin-bottom:2px}.md .box .mh .sub{font-size:12px;color:var(--dim)}
.md .box .mh .close{cursor:pointer;color:var(--dim);font-size:22px}
.md .box .mb{padding:18px 22px}
.md .box .mb .bs{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.md .box .mb .bs .n{font-size:32px;font-weight:700}
.md .box .mb .bs .b{flex:1;height:10px;border-radius:5px;background:var(--bg3);overflow:hidden}
.md .box .mb .bs .b .f{height:100%;border-radius:5px}
.md .box .mb .ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.md .box .mb .ig .g{display:flex;flex-direction:column}
.md .box .mb .ig .g .l{font-size:10px;color:var(--dim);text-transform:uppercase}
.md .box .mb .ig .g .v{font-size:14px}
.md .box .mb .desc{font-size:14px;line-height:1.6;margin-bottom:14px}
.md .box .mb .sr{font-size:13px;color:var(--dim);white-space:pre-wrap;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;max-height:180px;overflow-y:auto;line-height:1.5;margin-bottom:14px}
.md .box .mb .cfg{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;overflow-x:auto}
.md .box .mb .st{margin-top:14px;display:flex;gap:6px;flex-wrap:wrap}
.md .box .mb .st a{font-size:11px;padding:5px 14px;border-radius:6px;color:#fff;text-decoration:none}
</style></head><body>

  function after(label){var m=txt.match(new RegExp(label+"\\D{0,5}(\\d+)","i"));return m?parseInt(m[1]):0;}

  } else {add("VRAM","Not specified","4GB available",true);}
  
  // RAM — extract from "Memory: X GB" or similar
  var ram=after("memory")||after("ram");

  // Verdict

  // Build comparison table
  var dh="<table style='width:100%;border-collapse:collapse;margin:8px 0;font-size:12px'>";
  dh+="<tr style='border-bottom:1px solid var(--border)'><th style='text-align:left;padding:4px 6px;color:var(--dim);font-weight:500'>Requirement</th><th style='text-align:left;padding:4px 6px;color:var(--dim);font-weight:500'>Required</th><th style='text-align:left;padding:4px 6px;color:var(--dim);font-weight:500'>Your Machine</th><th style='text-align:center;padding:4px 6px;color:var(--dim);font-weight:500'>Status</th></tr>";
  for(var ci=0;ci<checks.length;ci++){
    var c=checks[ci];
    var icon=c.pass?"✓":"✗";
    var color=c.pass?"#3fb950":"#f85149";
    dh+="<tr style='border-bottom:1px solid var(--border)'>";
    dh+="<td style='padding:5px 6px;font-weight:500'>"+c.label+"</td>";
    dh+="<td style='padding:5px 6px;color:var(--dim)'>"+c.req+"</td>";
    dh+="<td style='padding:5px 6px'>"+c.val+"</td>";
    dh+="<td style='padding:5px 6px;text-align:center;color:"+color+"'>"+icon+"</td>";
    dh+="</tr>";
  }
  dh+="</table>";
  dh+="<div style='text-align:center;padding:10px;border-radius:6px;background:"+verdictColor+"22;border:2px solid "+verdictColor+"'>";
  dh+="<strong style='color:"+verdictColor+";font-size:14px'>"+verdict+"</strong>";
  dh+="<div style='font-size:11px;color:var(--dim);margin-top:4px'>"+pass+"/"+total+" requirements met</div></div>";
  
  det.innerHTML=dh;det.style.display="block";
  res.innerHTML="<strong style='color:"+verdictColor+"'>"+verdict+"</strong>";
  
  try{localStorage.setItem("bench_"+idx,verdict);}catch(e){}
  
  btn.disabled=false;
  btn.textContent="⚡ Re-run";
  updateBenchmarkFilter();
}

// Track benchmark results in filter
function updateBenchmarkFilter(){
  var fb=document.getElementById("fb");
  if(!fb)return;
  var counts={can:0,cant:0,unknown:0};
  for(var i=0;i<G.length;i++){
    try{
      var v=localStorage.getItem("bench_"+i);
      if(v==="Can Run")counts.can++;
      else if(v==="Will Not Run")counts.cant++;
      else counts.unknown++;
    }catch(e){counts.unknown++;}
  }
  fb.options[0].text="Benchmark: All ("+G.length+")";
  fb.options[1].text="Can Run ("+counts.can+")";
  fb.options[2].text="Will Not Run ("+counts.cant+")";
  if(fb.options[3])if(fb.options.length>3)fb.options[3].text="Not Tested ("+counts.unknown+")";
}

// Add benchmark filter to filter function

function addGame(id,name,btn){
  if(!id)return;
  if(!btn){alert("Add Game is only available in the local version.\n\nRun: ./wineport add-game add "+id);return;}
  btn.disabled=true;btn.textContent="Adding...";
  var x=new XMLHttpRequest();
  x.open("POST","/api/add-game/"+id,true);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      if(d.success){
        btn.textContent="Added!";
        btn.style.background="var(--dim)";
        setTimeout(function(){location.reload();},1500);
      } else if(d.name){
        btn.textContent="Exists!";
        btn.disabled=false;
        for(var gi=0;gi<G.length;gi++){
          if(G[gi].t===d.name||G[gi].s===id){D(gi);break;}
        }
        setTimeout(function(){btn.textContent="+ Add";},2000);
      } else {
        btn.textContent=d.error||"Failed";
        btn.disabled=false;
        setTimeout(function(){btn.textContent="+ Add";btn.disabled=false;},3000);
      }
    }catch(e){btn.textContent="Error";btn.disabled=false;}
  };
  x.onerror=function(){btn.textContent="Error";btn.disabled=false;};
  x.send();
}
